<!DOCTYPE html>
<html lang="bs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osnovni Chat — Dan 5</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            max-width: 560px;
            margin: 40px auto;
            padding: 0 16px;
        }

        h1 {
            font-size: 1.5rem;
        }

        .meta {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 12px;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        input[type="text"],
        input[type="range"] {
            width: 100%;
            box-sizing: border-box;
        }

        input[type="text"] {
            padding: 10px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #e2e8f0;
        }

        button {
            margin-top: 12px;
            padding: 10px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button:disabled {
            opacity: 0.5;
        }

        #odgovor {
            margin-top: 20px;
            padding: 16px;
            background: #1e293b;
            border-radius: 8px;
            min-height: 60px;
            line-height: 1.5;
        }

        .prompt-box {
            font-size: 0.85rem;
            background: #1e293b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            color: #cbd5e1;
        }
    </style>
</head>

<body>
    <h1>Osnovni Chat</h1>
    <p class="meta">Dan 5 — jedan system prompt · LLM se bira u .env fajlu</p>

    <div class="prompt-box">
        <strong>System prompt (u kodu):</strong>
        <p id="system-prompt">Učitavam...</p>
    </div>

    <label for="temp">Temperatura: <span id="temp-val">0.7</span></label>
    <input type="range" id="temp" min="0" max="1.5" step="0.1" value="0.7">

    <label for="poruka">Vaša poruka</label>
    <input type="text" id="poruka" placeholder="Npr: Šta je LLM?">

    <button id="btn">Pošalji</button>

    <div id="odgovor">Odgovor će se pojaviti ovdje.</div>

    <script>
        const porukaEl = document.getElementById('poruka');
        const tempEl = document.getElementById('temp');
        const tempVal = document.getElementById('temp-val');
        const btn = document.getElementById('btn');
        const odgovorEl = document.getElementById('odgovor');

        tempEl.addEventListener('input', () => {
            tempVal.textContent = parseFloat(tempEl.value).toFixed(1);
        });

        fetch('/api/info')
            .then(r => r.json())
            .then(data => {
                document.getElementById('system-prompt').textContent = data.system_prompt;
            });

        async function posalji() {
            const poruka = porukaEl.value.trim();
            if (!poruka) return;

            btn.disabled = true;
            btn.textContent = 'Čekam...';
            odgovorEl.textContent = 'Generišem odgovor...';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        poruka: poruka,
                        temperatura: parseFloat(tempEl.value)
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || res.statusText);
                odgovorEl.textContent = data.odgovor;
            } catch (err) {
                odgovorEl.textContent = 'Greška: ' + err.message;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Pošalji';
            }
        }

        btn.addEventListener('click', posalji);
        porukaEl.addEventListener('keydown', e => {
            if (e.key === 'Enter') posalji();
        });
    </script>
</body>

</html>
