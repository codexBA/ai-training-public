<!DOCTYPE html>
<html lang="bs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantička pretraga — Resursi BiH</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            max-width: 640px;
            margin: 40px auto;
            padding: 0 16px;
        }

        h1 {
            font-size: 1.4rem;
        }

        p.meta {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .box {
            background: #1e293b;
            padding: 12px;
            border-radius: 8px;
            margin: 12px 0;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #fff;
        }

        button {
            margin-top: 10px;
            padding: 10px 18px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button:disabled {
            opacity: 0.5;
            cursor: wait;
        }

        #pronadeno {
            color: #a7f3d0;
            border: 1px dashed #10b981;
            display: none;
        }

        #pronadeno .chunk {
            margin: 8px 0;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
        }

        #pronadeno .dist {
            color: #6ee7b7;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <h1>Semantička pretraga — Resursi BiH</h1>
    <p class="meta">ChromaDB + embeddings · dokument: <code>bih_resursi.txt</code> · top_k=3</p>

    <div class="box">
        Pretraga po <strong>značenju</strong>, ne po ključnim riječima.<br>
        Primjer: <em>"elektrane na vodi"</em> može pronaći odlomak o hidroenergiji.
    </div>

    <input type="text" id="q" placeholder="elektrane na vodi" value="elektrane na vodi">
    <button id="search">Pretraži</button>

    <div class="box" id="pronadeno"></div>

    <script>
        const q = document.getElementById('q');
        const pronadeno = document.getElementById('pronadeno');
        const searchBtn = document.getElementById('search');

        function prikaziPronadjene(lista) {
            if (!lista || !lista.length) {
                pronadeno.style.display = 'block';
                pronadeno.innerHTML = '<em>Nema rezultata.</em>';
                return;
            }
            pronadeno.style.display = 'block';
            pronadeno.innerHTML = '<strong>Pronađeno (' + lista.length + '):</strong>' +
                lista.map(d =>
                    '<div class="chunk"><span class="dist">udaljenost=' + d.udaljenost + '</span> ' +
                    d.tekst.substring(0, 220) + (d.tekst.length > 220 ? '…' : '') + '</div>'
                ).join('');
        }

        searchBtn.onclick = async () => {
            const upit = q.value.trim();
            if (!upit) return;
            searchBtn.disabled = true;
            pronadeno.style.display = 'none';
            try {
                const r = await fetch('/api/pretraga?q=' + encodeURIComponent(upit));
                const d = await r.json();
                if (!r.ok) {
                    pronadeno.style.display = 'block';
                    pronadeno.innerHTML = '<em>Greška: ' + (d.detail || 'nepoznato') + '</em>';
                    return;
                }
                prikaziPronadjene(d.pronadeni_dijelovi);
            } finally {
                searchBtn.disabled = false;
            }
        };
    </script>
</body>

</html>
