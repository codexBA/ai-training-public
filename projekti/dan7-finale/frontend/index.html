<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Državna Statistika - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="logo">
                <div class="logo-icon">📊</div>
                <h1>AI Državna Statistika</h1>
            </div>
            <p class="subtitle">Vaš asistent za ekonomske i državne podatke</p>
        </header>
        
        <main class="chat-box" id="chatBox">
            <div class="message system-message">
                <div class="avatar">AI</div>
                <div class="bubble">
                    Dobrodošli! Ja sam vaš AI asistent za državnu statistiku. Možete me pitati o budžetima, zaposlenicima, regijama ili ekonomskim podacima.
                </div>
            </div>
        </main>
        
        <div class="typing-indicator hidden" id="typingIndicator">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <footer class="chat-input-area">
            <form id="chatForm">
                <input type="text" id="userInput" placeholder="Upišite vaše pitanje ovdje..." autocomplete="off" required>
                <button type="submit" id="sendBtn">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="send-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
